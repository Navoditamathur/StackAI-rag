<!DOCTYPE html>
<html>
<head>
  <title>RAG Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 10px;
      max-width: 75%;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e0e0e0;
      color: black;
      margin-right: auto;
    }

    .sources {
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .loading {
      font-style: italic;
      color: gray;
    }
  </style>
</head>

<body>
  <div style="padding:10px; background:white; border-bottom:1px solid #ddd;">
    <input type="file" id="files" multiple />
    <button onclick="upload()">Upload PDFs</button>
    <span id="status"></span>
  </div>
<div class="container">

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, cls, sources=[]) {
  const div = document.createElement("div");
  div.className = "message " + cls;
  div.innerText = text;

  if (sources.length > 0) {
    const src = document.createElement("div");
    src.className = "sources";
    src.innerText = "Sources:\n" + sources.slice(0,3).join("\n---\n");
    div.appendChild(src);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
async function upload() {
  const filesInput = document.getElementById("files");
  const status = document.getElementById("status");

  if (filesInput.files.length === 0) {
    status.innerText = "No files selected";
    return;
  }

  const formData = new FormData();

  for (let file of filesInput.files) {
    formData.append("files", file);
  }

  status.innerText = "Uploading...";

  try {
    const res = await fetch("http://127.0.0.1:8000/ingest", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    status.innerText = "Upload successful ✅";

  } catch (err) {
    status.innerText = "Upload failed ❌";
  }
}
async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot loading";
  loading.innerText = "Thinking...";
  chat.appendChild(loading);

  try {
    const res = await fetch(`http://127.0.0.1:8000/query?q=${encodeURIComponent(text)}`);
    const data = await res.json();
    console.log("Data: ", data);

    loading.remove();

    addMessage(data.answer, "bot", data.sources || []);

  } catch (err) {
    loading.innerText = "Error connecting to backend";
  }
}
</script>

</body>
</html>
